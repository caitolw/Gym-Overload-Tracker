<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sobrecarga Gym Tracker</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220%22 width=%22100%22 height=%22100%22><text y=%220.9em%22 font-size=%2290%22>🏋️‍♂️</text></svg>">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0c0a09">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/recharts@2.12.2/umd/Recharts.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-950 text-stone-100 antialiased selection:bg-amber-500/30">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo } = React;
        
        // Componente de icono seguro que no se rompe ni se descuadra
        const Icon = ({ name, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            });
            return <i data-lucide={name} className={`inline-block shrink-0 ${className}`} style={{ width: '20px', height: '20px' }}></i>;
        };

        const {
            LineChart, Line, BarChart, Bar, ComposedChart, XAxis, YAxis, CartesianGrid,
            Tooltip, Legend, ResponsiveContainer
        } = Recharts;

        /* ============================== CONSTANTES ============================== */
        const ROUTINE_KEY = 'gymapp:routine:v1';
        const LOGS_KEY = 'gymapp:logs:v1';

        const MUSCLES = ['Pecho', 'Espalda', 'Piernas', 'Hombro', 'Bíceps', 'Tríceps', 'Core', 'Glúteo'];
        const DAYS = ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado', 'Domingo'];

        const uid = () => Math.random().toString(36).slice(2, 10);
        const epley1RM = (weight, reps) => weight * (1 + reps / 30);
        const epleyWeightForReps = (rm, reps) => rm / (1 + (reps - 1) / 30);
        const round1 = (n) => Math.round(n * 10) / 10;

        const computeSetWeight = (ex, index) => {
          const base = ex.sets[0];
          if (index === 0) return base?.weight ?? '';
          if (base == null || base.weight === '' || base.weight == null) return '';
          const effReps0 = Number(base.reps) + Number(base.rir);
          const rm = Number(base.weight) * (1 + (effReps0 - 1) / 30);
          const s = ex.sets[index];
          const effReps = Number(s.reps) + Number(s.rir);
          return round1(epleyWeightForReps(rm, effReps));
        };

        const DEFAULT_ROUTINE = {
          id: uid(),
          name: 'Rutina principal',
          week: 1,
          days: [
            {
              id: uid(),
              dayName: 'Lunes',
              muscles: ['Pecho'],
              exercises: [
                {
                  id: uid(),
                  name: 'Press banca',
                  rest: 120,
                  notes: '',
                  unit: 'kg',
                  sets: [
                    { id: uid(), reps: 6, rir: 0, weight: '' },
                    { id: uid(), reps: 6, rir: 2, weight: '' },
                    { id: uid(), reps: 6, rir: 2, weight: '' },
                    { id: uid(), reps: 8, rir: 1, weight: '' },
                  ],
                },
              ],
            },
          ],
        };

        /* ============================== ALMACENAMIENTO LOCAL ============================== */
        function useStoredState(key, initial) {
          const [value, setValue] = useState(initial);
          const [loaded, setLoaded] = useState(false);

          useEffect(() => {
            try {
              const saved = localStorage.getItem(key);
              if (saved) setValue(JSON.parse(saved));
            } catch (e) {
              console.error(e);
            } finally {
              setLoaded(true);
            }
          }, [key]);

          useEffect(() => {
            if (!loaded) return;
            localStorage.setItem(key, JSON.stringify(value));
          }, [value, loaded, key]);

          return [value, setValue, loaded];
        }

        /* ============================== COMPONENTES INTERFAZ ============================== */
        const Card = ({ children, className = '' }) => (
          <div className={`bg-stone-900 border border-stone-800/80 rounded-xl p-4 shadow-md ${className}`}>{children}</div>
        );

        const Pill = ({ children, tone = 'default' }) => {
          const tones = {
            default: 'bg-stone-800 text-stone-300',
            amber: 'bg-amber-500/10 text-amber-400 border border-amber-500/20',
            teal: 'bg-teal-500/10 text-teal-400 border border-teal-500/20',
          };
          return <span className={`px-2 py-0.5 rounded-md text-xs font-semibold tracking-wide ${tones[tone]}`}>{children}</span>;
        };

        const NumInput = ({ value, onChange, className = '', step = 1, placeholder }) => (
          <input
            type="number"
            inputMode="decimal"
            value={value}
            step={step}
            placeholder={placeholder}
            onChange={(e) => onChange(e.target.value === '' ? '' : Number(e.target.value))}
            className={`w-full bg-stone-950 border border-stone-800 rounded-lg px-2 py-2 text-stone-100 font-mono text-center text-sm focus:outline-none focus:ring-1 focus:ring-amber-500 focus:border-amber-500 ${className}`}
          />
        );

        const MuscleMultiSelect = ({ value, onChange }) => {
          const [open, setOpen] = useState(false);
          const list = value || [];
          const toggle = (m) => {
            if (list.includes(m)) onChange(list.filter((x) => x !== m));
            else onChange([...list, m]);
          };
          return (
            <div className="relative inline-block z-30">
              <button type="button" onClick={() => setOpen((o) => !o)} className="bg-stone-950 border border-stone-800 rounded-lg px-3 py-2 text-stone-300 text-xs flex items-center gap-1.5 justify-between min-w-[130px]">
                <span className="truncate max-w-[100px]">{list.length ? list.join(', ') : 'Músculos'}</span>
                <Icon name="chevron-down" className="w-3 h-3 text-stone-500" />
              </button>
              {open && (
                <div className="absolute left-0 mt-1 bg-stone-900 border border-stone-700 rounded-xl p-1.5 shadow-2xl w-48 max-h-60 overflow-y-auto">
                  {MUSCLES.map((m) => (
                    <label key={m} className="flex items-center gap-2.5 px-2 py-2 rounded-lg hover:bg-stone-800 cursor-pointer text-xs text-stone-200">
                      <input type="checkbox" checked={list.includes(m)} onChange={() => toggle(m)} className="accent-amber-500 w-4 h-4 rounded" />
                      {m}
                    </label>
                  ))}
                  <button type="button" onClick={() => setOpen(false)} className="mt-1 w-full text-xs text-amber-400 font-semibold hover:text-amber-300 py-2 border-t border-stone-800">Cerrar</button>
                </div>
              )}
            </div>
          );
        };

        const PlateBar = ({ weight, maxWeight, label, highlight }) => {
          const pct = maxWeight > 0 ? Math.max(4, (weight / maxWeight) * 100) : 4;
          return (
            <div className="flex items-center gap-3">
              <div className="w-12 text-left font-mono text-xs text-stone-500">{label}</div>
              <div className="flex-1 h-5 bg-stone-950 rounded-md overflow-hidden border border-stone-800 relative">
                <div className={`h-full ${highlight ? 'bg-amber-500' : 'bg-stone-700'} transition-all duration-300`} style={{ width: `${pct}%` }} />
              </div>
              <div className="w-16 font-mono text-xs text-stone-100 text-right font-bold">{round1(weight)} kg</div>
            </div>
          );
        };

        /* ============================== CONSTRUCTOR RUTINAS ============================== */
        function RoutineBuilder({ routine, setRoutine }) {
          const addDay = () => setRoutine((r) => ({ ...r, days: [...r.days, { id: uid(), dayName: 'Lunes', muscles: [MUSCLES[0]], exercises: [] }] }));
          const updateDay = (dayId, patch) => setRoutine((r) => ({ ...r, days: r.days.map((d) => (d.id === dayId ? { ...d, ...patch } : d)) }));
          const removeDay = (dayId) => setRoutine((r) => ({ ...r, days: r.days.filter((d) => d.id !== dayId) }));
          const duplicateDay = (dayId) => setRoutine((r) => {
            const day = r.days.find((d) => d.id === dayId);
            const clone = { ...day, id: uid(), exercises: day.exercises.map((ex) => ({ ...ex, id: uid(), sets: ex.sets.map((s) => ({ ...s, id: uid() })) })) };
            const idx = r.days.findIndex((d) => d.id === dayId);
            const days = [...r.days]; days.splice(idx + 1, 0, clone);
            return { ...r, days };
          });
          const addExercise = (dayId) => updateDayExercises(dayId, (exs) => [...exs, { id: uid(), name: 'Nuevo ejercicio', rest: 90, notes: '', unit: 'kg', sets: [{ id: uid(), reps: 8, rir: 2, weight: '' }] }]);
          const updateDayExercises = (dayId, updater) => setRoutine((r) => ({ ...r, days: r.days.map((d) => (d.id === dayId ? { ...d, exercises: updater(d.exercises) } : d)) }));
          const updateExercise = (dayId, exId, patch) => updateDayExercises(dayId, (exs) => exs.map((ex) => (ex.id === exId ? { ...ex, ...patch } : ex)));
          const removeExercise = (dayId, exId) => updateDayExercises(dayId, (exs) => exs.filter((ex) => ex.id !== exId));
          const addSet = (dayId, exId) => updateExerciseSets(dayId, exId, (sets) => [...sets, { id: uid(), reps: 8, rir: 2, weight: '' }]);
          const updateExerciseSets = (dayId, exId, updater) => updateDayExercises(dayId, (exs) => exs.map((ex) => (ex.id === exId ? { ...ex, sets: updater(ex.sets) } : ex)));
          const updateSet = (dayId, exId, setId, patch) => updateExerciseSets(dayId, exId, (sets) => sets.map((s) => (s.id === setId ? { ...s, ...patch } : s)));
          const removeSet = (dayId, exId, setId) => updateExerciseSets(dayId, exId, (sets) => sets.filter((s) => s.id !== setId));

          return (
            <div className="space-y-4">
              <div className="flex items-center justify-between">
                <div>
                  <h2 className="font-display text-xl text-stone-100">Tus Rutinas</h2>
                  <p className="text-stone-500 text-xs">Organiza los días de entreno.</p>
                </div>
                <button onClick={addDay} className="flex items-center gap-1 bg-amber-500 hover:bg-amber-400 text-stone-950 font-bold text-xs px-3 py-2 rounded-xl transition-colors shadow">
                  <Icon name="plus" className="w-3.5 h-3.5" /> Añadir Día
                </button>
              </div>
              
              {routine.days.map((day) => (
                <Card key={day.id} className="space-y-3">
                  <div className="flex items-center gap-2 border-b border-stone-800 pb-2">
                    <select value={day.dayName} onChange={(e) => updateDay(day.id, { dayName: e.target.value })} className="bg-stone-950 border border-stone-800 rounded-lg px-2 py-2 text-stone-100 text-xs font-bold outline-none">
                      {DAYS.map((d) => <option key={d} value={d}>{d}</option>)}
                    </select>
                    <MuscleMultiSelect value={day.muscles} onChange={(muscles) => updateDay(day.id, { muscles })} />
                    <div className="flex-1" />
                    <button onClick={() => duplicateDay(day.id)} className="p-1.5 text-stone-500 hover:text-teal-400"><Icon name="copy" /></button>
                    <button onClick={() => removeDay(day.id)} className="p-1.5 text-stone-500 hover:text-red-400"><Icon name="trash-2" /></button>
                  </div>

                  <div className="space-y-3">
                    {day.exercises.map((ex) => (
                      <div key={ex.id} className="bg-stone-950/60 border border-stone-800/60 rounded-xl p-3 space-y-2">
                        <div className="flex items-center gap-2">
                          <input value={ex.name} onChange={(e) => updateExercise(day.id, ex.id, { name: e.target.value })} className="flex-1 bg-transparent border-b border-stone-800 outline-none text-stone-100 font-semibold text-sm py-0.5" placeholder="Nombre Ejercicio" />
                          <div className="flex items-center gap-1 text-stone-500 text-xs">
                            <Icon name="timer" className="w-3.5 h-3.5 text-stone-600" />
                            <NumInput value={ex.rest} onChange={(v) => updateExercise(day.id, ex.id, { rest: v })} className="w-12 py-1 text-xs" />
                          </div>
                          <button onClick={() => removeExercise(day.id, ex.id)} className="p-1 text-stone-600 hover:text-red-400"><Icon name="trash-2" className="w-4 h-4" /></button>
                        </div>

                        {/* Encabezado de la tabla pequeña */}
                        <div className="grid grid-cols-[30px_1fr_1fr_1fr_25px] gap-1.5 items-center text-[10px] uppercase font-bold tracking-wider text-stone-500 px-1 text-center">
                          <span>Set</span><span>Kg</span><span>Reps</span><span>RIR</span><span></span>
                        </div>

                        <div className="space-y-1.5">
                          {ex.sets.map((s, i) => (
                            <div key={s.id} className="grid grid-cols-[30px_1fr_1fr_1fr_25px] gap-1.5 items-center">
                              <span className="font-mono text-xs text-stone-400 text-center font-bold">{i + 1}</span>
                              {i === 0 ? <NumInput value={s.weight ?? ''} onChange={(v) => updateSet(day.id, ex.id, s.id, { weight: v })} step={0.5} placeholder="Base" /> : <div className="bg-stone-900 border border-stone-850 text-[11px] py-2 rounded-lg text-stone-500 font-mono text-center">Auto</div>}
                              <NumInput value={s.reps} onChange={(v) => updateSet(day.id, ex.id, s.id, { reps: v })} placeholder="Reps" />
                              <NumInput value={s.rir} onChange={(v) => updateSet(day.id, ex.id, s.id, { rir: v })} placeholder="RIR" />
                              <button onClick={() => removeSet(day.id, ex.id, s.id)} className="p-1 text-stone-700 hover:text-red-400 flex justify-center"><Icon name="x" className="w-3.5 h-3.5" /></button>
                            </div>
                          ))}
                        </div>
                        <button onClick={() => addSet(day.id, ex.id)} className="text-xs font-semibold text-teal-400 flex items-center gap-1 pt-1"><Icon name="plus" className="w-3 h-3" /> Añadir Serie</button>
                      </div>
                    ))}
                    <button onClick={() => addExercise(day.id)} className="w-full bg-stone-950/40 hover:bg-stone-950 text-xs font-semibold text-amber-400 border border-dashed border-stone-800 py-2.5 rounded-xl flex items-center justify-center gap-1.5 transition-colors"><Icon name="plus" className="w-3.5 h-3.5" /> Añadir Ejercicio</button>
                  </div>
                </Card>
              ))}
            </div>
          );
        }

        /* ============================== SESIÓN DE ENTRENAMIENTO ============================== */
        function getLastExerciseRM(logs, exerciseName) {
          const rows = logs.filter((l) => l.exercise === exerciseName);
          if (rows.length === 0) return null;
          const lastDate = rows.reduce((max, r) => (r.date > max ? r.date : max), rows[0].date);
          const sameDate = rows.filter((r) => r.date === lastDate);
          return { rm: Math.max(...sameDate.map((r) => r.rm)), date: lastDate };
        }

        function getISOWeekLabel(dateStr) {
          const d = new Date(dateStr + 'T00:00:00');
          const target = new Date(d.valueOf());
          const dayNr = (d.getDay() + 6) % 7; target.setDate(target.getDate() - dayNr + 3);
          const firstThursday = new Date(target.getFullYear(), 0, 4);
          return `${target.getFullYear()}-W${String(1 + Math.round((target - firstThursday) / (7 * 24 * 3600 * 1000))).padStart(2, '0')}`;
        }

        function generateSampleLogs() {
          const templates = [
            { name: 'Press banca', muscle: 'Pecho', day: 'Lunes', base: 60, inc: 1.25, sets: [{ reps: 6, rir: 0 }, { reps: 6, rir: 2 }] },
            { name: 'Sentadilla', muscle: 'Piernas', day: 'Martes', base: 80, inc: 2, sets: [{ reps: 5, rir: 0 }, { reps: 5, rir: 2 }] }
          ];
          const logs = []; const today = new Date();
          for (let w = 1; w <= 10; w++) {
            const dateStr = new Date(today.getTime() - (10 - w) * 7 * 24 * 3600 * 1000).toISOString().slice(0, 10);
            templates.forEach((t) => {
              const set1Weight = round1(t.base + (w - 1) * t.inc);
              t.sets.forEach((s, i) => {
                logs.push({ id: uid(), date: dateStr, week: w, day: t.day, exercise: t.name, muscle: t.muscle, setIndex: i + 1, weight: set1Weight, reps: s.reps, rir: s.rir, rm: round1(epley1RM(set1Weight, s.reps)), volume: round1(set1Weight * s.reps) });
              });
            });
          }
          return logs;
        }

        function TrainingSession({ routine, logs, setLogs }) {
          const todayDayName = DAYS[(new Date().getDay() + 6) % 7];
          const [selectedDayName, setSelectedDayName] = useState(todayDayName);
          const [entries, setEntries] = useState({});
          const [savedExercises, setSavedExercises] = useState({});

          const matchingDays = useMemo(() => routine.days.filter((d) => d.dayName === selectedDayName), [routine, selectedDayName]);

          const suggestionFor = useCallback((exerciseName, targetReps, targetRir, plannedWeight) => {
            const last = getLastExerciseRM(logs, exerciseName);
            if (!last) return plannedWeight !== '' && plannedWeight != null ? round1(Number(plannedWeight)) : null;
            return round1(epleyWeightForReps(last.rm, Number(targetReps) + Number(targetRir)));
          }, [logs]);

          useEffect(() => {
            const prefill = {};
            matchingDays.forEach((d) => {
              d.exercises.forEach((ex) => {
                ex.sets.forEach((s, i) => {
                  const sugg = suggestionFor(ex.name, s.reps, s.rir, computeSetWeight(ex, i));
                  prefill[`${ex.id}:${s.id}`] = { weight: sugg != null ? sugg : '', reps: s.reps, rir: s.rir };
                });
              });
            });
            setEntries(prefill); setSavedExercises({});
          }, [selectedDayName, matchingDays, suggestionFor]);

          const saveExercise = (dayObj, ex) => {
            const todayISO = new Date().toISOString().slice(0, 10);
            const newLogs = [];
            ex.sets.forEach((s, i) => {
              const entry = entries[`${ex.id}:${s.id}`];
              if (!entry || entry.weight === '') return;
              const w = Number(entry.weight); const r = Number(entry.reps);
              newLogs.push({ id: uid(), date: todayISO, week: routine.week || 1, day: dayObj.dayName, exercise: ex.name, muscle: (dayObj.muscles || []).join(', '), setIndex: i + 1, weight: w, reps: r, rir: Number(entry.rir), rm: round1(epley1RM(w, r)), volume: round1(w * r) });
            });
            if (newLogs.length > 0) {
              setLogs((prev) => [...prev, ...newLogs]);
              setSavedExercises((s) => ({ ...s, [ex.id]: true }));
            }
          };

          return (
            <div className="space-y-4">
              {/* Selector de días tipo píldoras deslizable */}
              <div className="flex gap-1.5 overflow-x-auto pb-2 scrollbar-none snap-x -mx-4 px-4">
                {DAYS.map((dName) => (
                  <button key={dName} onClick={() => setSelectedDayName(dName)} className={`snap-center shrink-0 px-4 py-2.5 rounded-xl text-xs font-bold border transition-all ${dName === selectedDayName ? 'bg-amber-500 border-amber-500 text-stone-950' : 'bg-stone-900 border-stone-800 text-stone-400'}`}>{dName}</button>
                ))}
              </div>

              {matchingDays.length === 0 && <Card className="py-12 text-center text-stone-500 text-sm">No tienes ejercicios programados para los {selectedDayName.toLowerCase()}s.</Card>}
              
              {matchingDays.map((dayObj) => (
                <div key={dayObj.id} className="space-y-3">
                  {dayObj.exercises.map((ex) => {
                    const last = getLastExerciseRM(logs, ex.name);
                    return (
                      <Card key={ex.id} className="space-y-3">
                        <div className="flex justify-between items-start border-b border-stone-800/60 pb-2">
                          <div>
                            <h3 className="font-bold text-sm text-stone-100">{ex.name}</h3>
                            <p className="text-[11px] text-stone-500 mt-0.5">Descanso: {ex.rest}s</p>
                          </div>
                          {last && <Pill tone="teal">Previo: {last.rm}kg</Pill>}
                        </div>

                        <div className="grid grid-cols-[30px_1fr_1fr_1fr] gap-2 text-[10px] font-bold text-stone-500 uppercase px-1 text-center">
                          <span>Set</span><span>Kg</span><span>Reps</span><span>RIR</span>
                        </div>

                        <div className="space-y-2">
                          {ex.sets.map((s, i) => {
                            const ent = entries[`${ex.id}:${s.id}`] || {};
                            return (
                              <div key={s.id} className="grid grid-cols-[30px_1fr_1fr_1fr] gap-2 items-center">
                                <span className="text-xs font-mono font-bold text-stone-500 text-center">{i+1}</span>
                                <NumInput value={ent.weight ?? ''} onChange={(v) => setEntries(e => ({...e, [`${ex.id}:${s.id}`]: {...ent, weight:v}}))} placeholder="Kg" />
                                <NumInput value={ent.reps ?? ''} onChange={(v) => setEntries(e => ({...e, [`${ex.id}:${s.id}`]: {...ent, reps:v}}))} placeholder="Reps" />
                                <NumInput value={ent.rir ?? ''} onChange={(v) => setEntries(e => ({...e, [`${ex.id}:${s.id}`]: {...ent, rir:v}}))} placeholder="RIR" />
                              </div>
                            );
                          })}
                        </div>
                        <button onClick={() => saveExercise(dayObj, ex)} disabled={savedExercises[ex.id]} className={`w-full mt-2 py-2.5 rounded-xl text-xs font-bold shadow-md transition-colors ${savedExercises[ex.id] ? 'bg-teal-900/40 text-teal-400 border border-teal-500/20' : 'bg-amber-500 text-stone-950 hover:bg-amber-400'}`}>
                          {savedExercises[ex.id] ? '✓ Serie Registrada con Éxito' : 'Registrar Ejercicio'}
                        </button>
                      </Card>
                    );
                  })}
                </div>
              ))}
            </div>
          );
        }

        /* ============================== PROGRESO Y GRÁFICOS ============================== */
        function Progress({ logs, setLogs }) {
          const exerciseNames = useMemo(() => [...new Set(logs.map((l) => l.exercise))], [logs]);
          const [selected, setSelected] = useState(exerciseNames[0] || '');
          useEffect(() => { if (!selected && exerciseNames.length > 0) setSelected(exerciseNames[0]); }, [exerciseNames, selected]);

          const weekly = useMemo(() => {
            const rows = logs.filter((l) => l.exercise === selected);
            const byWeek = {};
            rows.forEach((r) => {
              const wk = getISOWeekLabel(r.date);
              if (!byWeek[wk]) byWeek[wk] = { week: wk, rm: 0, volume: 0 };
              byWeek[wk].rm = Math.max(byWeek[wk].rm, r.rm);
              byWeek[wk].volume += r.volume;
            });
            return Object.values(byWeek).sort((a, b) => a.week > b.week ? 1 : -1);
          }, [logs, selected]);

          if (logs.length === 0) {
            return (
              <div className="text-center py-16 space-y-4">
                <p className="text-stone-500 text-sm">Aún no registras entrenamientos para armar estadísticas.</p>
                <button onClick={() => setLogs(generateSampleLogs())} className="bg-stone-900 border border-stone-800 hover:bg-stone-800 text-stone-200 px-4 py-2.5 rounded-xl text-xs font-semibold flex items-center gap-1.5 mx-auto transition-colors"><Icon name="sparkles" className="w-3.5 h-3.5 text-amber-500" /> Cargar Historial Demo</button>
              </div>
            );
          }

          return (
            <div className="space-y-4">
              <select value={selected} onChange={(e) => setSelected(e.target.value)} className="w-full bg-stone-900 p-3 rounded-xl text-stone-200 border border-stone-800 outline-none text-sm font-medium">
                {exerciseNames.map(n => <option key={n} value={n}>{n}</option>)}
              </select>
              <Card>
                <h3 className="text-xs font-bold text-stone-400 mb-3 uppercase tracking-wider">Evolución 1RM Estimado (kg)</h3>
                <div style={{ width: '100%', height: 220 }} className="-ml-6 pr-2">
                  <ResponsiveContainer>
                    <LineChart data={weekly}>
                      <CartesianGrid stroke="#292524" strokeDasharray="3 3" />
                      <XAxis dataKey="week" tick={{fill: '#a8a29e', fontSize: 9}} stroke="#44403c" />
                      <YAxis tick={{fill: '#a8a29e', fontSize: 9}} domain={['auto', 'auto']} stroke="#44403c" />
                      <Tooltip contentStyle={{ background: '#1c1917', border: '1px solid #44403c', borderRadius: '12px', fontSize: '12px' }} />
                      <Line type="monotone" dataKey="rm" stroke="#f59e0b" strokeWidth={3} dot={{r: 3}} activeDot={{ r: 5 }} />
                    </LineChart>
                  </ResponsiveContainer>
                </div>
              </Card>
            </div>
          );
        }

        function EpleyCalculator() {
          const [weight, setWeight] = useState(100); const [reps, setReps] = useState(6);
          const rm = weight && reps ? epley1RM(Number(weight), Number(reps)) : 0;
          const maxTableWeight = rm > 0 ? rm : 100;
          return (
            <div className="space-y-4">
              <Card className="space-y-4">
                <h2 className="font-bold text-sm uppercase tracking-wider text-stone-400">Calculadora 1RM (Epley)</h2>
                <div className="grid grid-cols-2 gap-4">
                  <div><label className="text-xs text-stone-500 block mb-1 font-semibold">Peso levantado (kg)</label><NumInput value={weight} onChange={setWeight} /></div>
                  <div><label className="text-xs text-stone-500 block mb-1 font-semibold">Repeticiones totales</label><NumInput value={reps} onChange={setReps} /></div>
                </div>
                <div className="text-center bg-stone-950 p-4 rounded-xl border border-stone-850/80">
                  <div className="text-[11px] uppercase tracking-widest text-stone-500 font-bold">Tu 1RM Máximo Estimado</div>
                  <div className="text-3xl font-black text-amber-500 mt-1 font-mono tracking-tight">{round1(rm)} <span className="text-lg font-bold text-stone-400">kg</span></div>
                </div>
              </Card>
              <Card className="space-y-3">
                 <h3 className="text-xs font-bold text-stone-400 uppercase tracking-wider">Equivalencias de Fuerza</h3>
                 <div className="space-y-2.5 pt-1">
                    <PlateBar label="1 Rep" weight={rm} maxWeight={maxTableWeight} highlight={reps === 1} />
                    <PlateBar label="5 Reps" weight={epleyWeightForReps(rm, 5)} maxWeight={maxTableWeight} highlight={reps === 5} />
                    <PlateBar label="8 Reps" weight={epleyWeightForReps(rm, 8)} maxWeight={maxTableWeight} highlight={reps === 8} />
                    <PlateBar label="10 Reps" weight={epleyWeightForReps(rm, 10)} maxWeight={maxTableWeight} highlight={reps === 10} />
                 </div>
              </Card>
            </div>
          );
        }

        /* ============================== ESTRUCTURA GLOBAL ============================== */
        const TABS = [
          { id: 'routine', label: 'Rutinas', icon: 'clipboard-list' },
          { id: 'train', label: 'Entrenar', icon: 'dumbbell' },
          { id: 'progress', label: 'Progreso', icon: 'trending-up' },
          { id: 'calc', label: '1RM', icon: 'calculator' },
        ];

        function App() {
          const [routine, setRoutine, routineLoaded] = useStoredState(ROUTINE_KEY, DEFAULT_ROUTINE);
          const [logs, setLogs, logsLoaded] = useStoredState(LOGS_KEY, []);
          const [tab, setTab] = useState('train');

          const ready = routineLoaded && logsLoaded;

          return (
            <div className="min-h-screen bg-stone-950 text-stone-100 flex flex-col justify-between select-none max-w-md mx-auto relative overflow-x-hidden" style={{ fontFamily: "'Inter', ui-sans-serif, system-ui" }}>
              <style>{`
                @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@700&display=swap');
                .font-display { font-family: 'Oswald', ui-sans-serif, system-ui; text-transform: uppercase; letter-spacing: 0.05em; }
                .font-mono { font-family: 'JetBrains Mono', monospace; }
                .scrollbar-none::-webkit-scrollbar { display: none; }
                .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }
                input[type="number"]::-webkit-inner-spin-button, 
                input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
              `}</style>

              {/* Cabecera Móvil Fija */}
              <header className="border-b border-stone-900 sticky top-0 bg-stone-950/90 backdrop-blur z-40 w-full">
                <div className="px-4 py-3 flex items-center justify-between">
                  <div className="flex items-center gap-2">
                    <Icon name="dumbbell" className="text-amber-500 w-5 h-5" />
                    <h1 className="font-display text-base font-bold tracking-wider">SOBRECARGA</h1>
                  </div>
                  <span className="text-[9px] bg-stone-900 text-amber-500 border border-amber-500/20 px-2 py-0.5 rounded-md font-mono font-bold">EPLEY SYSTEM</span>
                </div>
              </header>

              {/* Contenido Principal con Margen Inferior para no tapar el Menú */}
              <main className="flex-1 w-full px-4 pt-4 pb-28 overflow-y-auto">
                {!ready ? (
                  <div className="text-center text-stone-600 py-20 text-xs font-semibold">Cargando base de datos…</div>
                ) : (
                  <>
                    {tab === 'routine' && <RoutineBuilder routine={routine} setRoutine={setRoutine} />}
                    {tab === 'train' && <TrainingSession routine={routine} logs={logs} setLogs={setLogs} />}
                    {tab === 'progress' && <Progress logs={logs} setLogs={setLogs} />}
                    {tab === 'calc' && <EpleyCalculator />}
                  </>
                )}
              </main>

              {/* Menú de Navegación Inferior Fijo */}
              <nav className="fixed bottom-0 left-0 right-0 bg-stone-950/95 backdrop-blur-md border-t border-stone-900 py-2.5 flex justify-around max-w-md mx-auto z-50 shadow-2xl px-2">
                {TABS.map((t) => {
                  const active = tab === t.id;
                  return (
                    <button key={t.id} onClick={() => setTab(t.id)} className={`flex flex-col items-center gap-1.5 text-[10px] font-bold tracking-wide w-16 transition-all duration-200 ${active ? 'text-amber-500 scale-105' : 'text-stone-500 hover:text-stone-400'}`}>
                      <Icon name={t.icon} className={active ? "text-amber-500" : "text-stone-500"} />
                      {t.label}
                    </button>
                  );
                })}
              </nav>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
